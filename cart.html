<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Hotties.Brandz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">Hotties.Brandz</h1>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="feedback.html">Feedback</a>
        <a href="reviews.html">Reviews</a>
        <a href="cart.html">Cart 🛒(<span id="cart-count">0</span>)</a>
    </nav>
</header>
<section class="content">
    <h2>Your Cart 🛒</h2>

    <div class="cart-wrapper">
        <div id="cart-list"></div>

        <div class="cart-summary">
            <h3>Total: P<span id="cart-total">0</span></h3>

            <button onclick="clearCart()" class="clear-btn">Clear Cart</button>

            <!--<div class="btn-center">
                <button onclick="location.href='checkout.html'" class="submit-btn">
                    Proceed to Checkout
                </button>
            </div>-->
        </div>
    </div>
</section>


<section id="order-form" class="content">
    <h2>Checkout Details</h2>

    <form onsubmit="submitOrder(event)" class="feedback-form">
        <input type="text" placeholder="Full Name" required>
        <input type="tel" placeholder="Phone Number" required>
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Delivery Address" required>
        <input type="tel" placeholder="Card Number" pattern="[0-9]{13,19}" maxlength="19" autocomplete="cc-number" required>
        <input type="text" placeholder="Cardholder Name" required>
        <div class="label">
            <label>Card Expiry Date</label>
        </div>
        <input type="date" placeholder="Expiry Date" required>
        <input type="number" placeholder="CSV" required>

 <div class="btn-center">
    <button type="submit" class="submit-btn">Place Order</button>
</div>
        
    </form>
</section>

<section id="success-banner" class="content">
    <h2>Your Order Has Been Placed</h2>
    <h3>Your order progress updates will be provided through provided contact details</h3>

    <div class="success-icon">
        <img src="success.png" width="20%">
    </div>
    
     <div class="btn-center">
        <button class="submit-btn" href="shop.html">Go Back to Shop</button>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
