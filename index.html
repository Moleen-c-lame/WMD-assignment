<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Threadz | Modern Streetwear</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Urban Threadz</h1>
    <nav>
      <a href="#shop">Shop</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="hero">
    <h2>Bold Streetwear for Every Season</h2>
    <button>Shop Now</button>
  </section>

  <section id="shop">
    <h2>Featured Collection</h2>
    <div class="products">
      <div class="product">
        <img src="images/hoodie.jpg" alt="Hoodie">
        <h3>Classic Hoodie</h3>
        <p>$45</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="images/jacket.jpg" alt="Jacket">
        <h3>Denim Jacket</h3>
        <p>$70</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>

  <section id="about">
    <h2>About Us</h2>
    <p>Urban Threadz is all about merging comfort with style — outfits that move with you.</p>
  </section>

  <section id="contact">
    <h2>Get in Touch</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    <p>© 2024 Urban Threadz</p>
  </footer>
</body>
</html>
